# Site settings
title: Zekeriya AY # site title
description: >- # site description
  He's writing about cybersecurity, technology and experience as a journal 
  for documentation things that he learned, meet him <a href="https://github.com/ZekeriyaAY" target="_blank" rel="noopener">@github</a>.
lang: en-US # default lang
timezone: Europe/Istanbul # set your timezone
image: assets/img/ogp.png # This image used for Open Graph more info https://ogp.me/
repo: https://github.com/ZekeriyaAY/zekeriyaay.com/tree/jekyll # site repo [optional]
mode: dark # default theme "dark" | "light"

# Profile settings
author:
  name: Zekeriya AY # author name
  bio: >- # tell to the world
    Welcome to the personal website of<br>
    a <i>computer engineering</i> undergraduate student<br>
    interested in <i>cybersecurity</i>, <i>blue team</i>
  username: z3k # general username
  github: ZekeriyaAY # github username
  twitter: zekeriyaaycom # twitter username
  linkedin: zekeriyaay
  # facebook: facebook_username # facebook username
  email: zekeriya@zekeriyaay.com # email adress
  avatar: /assets/img/avatar.jpeg # change with your own avatar

# URL settings
url: "https://zekeriyaay.com" #
baseurl: "/"
permalink: /:title/
google_analytics: G-7LLJDJ25PQ # leave it blank if not wish
# fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Homepage limit posts
# number_of_posts: 3

# Build settings
# theme: klise
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - lighthouse.png
  - klise-*.gem
  - klise.gemspec

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  # - jekyll-postfiles
